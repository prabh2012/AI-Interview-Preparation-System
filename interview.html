<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Studio — Live</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="studio-shell">

    <span class="eyebrow live"><span class="dot"></span> On Air</span>

    <div class="panel">

        <div class="session-meta">
            <span class="role-name">{{ role }}</span>
            <span class="counter" id="counter">Q <b id="q-index">{{ index }}</b> / {{ "%02d"|format(total) }}</span>
        </div>

        <div class="progress-track">
            <div class="progress-fill" id="progress-fill" style="width: {{ (index / total * 100) | round }}%;"></div>
        </div>

        <div class="question-card" id="question">{{ question }}</div>

        <div class="waveform-stage">
            <canvas id="waveform" width="360" height="64"></canvas>
            <button class="mic-button" id="mic-btn" type="button" aria-label="Answer by voice">🎤</button>
            <div class="listening-label" id="listening-label">Tap the mic to answer</div>
        </div>

        <div id="status-line"></div>

        <button class="btn-ghost" id="next-btn" type="button" disabled style="margin-top: 18px;">
            Next question →
        </button>

        <div class="session-log" id="log"></div>

    </div>

    <div class="footer-note" id="bottom-note">Question {{ index }} of {{ total }} &middot; {{ role }}</div>

</div>

<script>
const TOTAL = {{ total }};
let qIndex = {{ index }};          // 1-based, for display
let question = {{ question | tojson }};
let answered = false;

const questionEl   = document.getElementById('question');
const micBtn       = document.getElementById('mic-btn');
const nextBtn      = document.getElementById('next-btn');
const listeningLbl = document.getElementById('listening-label');
const statusLine   = document.getElementById('status-line');
const logEl        = document.getElementById('log');
const counterEl    = document.getElementById('q-index');
const progressFill = document.getElementById('progress-fill');
const bottomNote   = document.getElementById('bottom-note');
const canvas       = document.getElementById('waveform');
const canvasCtx    = canvas.getContext('2d');

let audioCtx, analyser, micStream, rafId;
let recognition, recognizing = false;

// ---------------- SPEAK ----------------
function speak(text) {
    if (!('speechSynthesis' in window)) return;
    const synth = window.speechSynthesis;
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    const voices = synth.getVoices();
    if (voices.length > 0) {
        msg.voice = voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    msg.rate = 1;
    msg.onerror = (event) => {
        console.warn('Speech synthesis error:', event.error);
    };
    synth.cancel();
    synth.speak(msg);
}

function speakQuestion(text) {
    if (!('speechSynthesis' in window)) return;
    const synth = window.speechSynthesis;

    const speakNow = () => speak(text);
    if (synth.getVoices().length === 0) {
        synth.onvoiceschanged = () => {
            speakNow();
            synth.onvoiceschanged = null;
        };
    } else {
        speakNow();
    }
}

window.addEventListener('load', () => speakQuestion(question));

// ---------------- WAVEFORM (signature element) ----------------
function drawIdle() {
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.fillStyle = 'rgba(231,234,240,0.10)';
    const bars = 28, gap = 4;
    const w = (canvas.width - gap * (bars - 1)) / bars;
    for (let i = 0; i < bars; i++) {
        const h = 4;
        canvasCtx.fillRect(i * (w + gap), (canvas.height - h) / 2, w, h);
    }
}
drawIdle();

function drawFrame() {
    if (!analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    const bars = 28, gap = 4;
    const w = (canvas.width - gap * (bars - 1)) / bars;
    const step = Math.floor(data.length / bars);

    for (let i = 0; i < bars; i++) {
        const v = data[i * step] / 255;
        const h = Math.max(4, v * canvas.height);
        const grad = canvasCtx.createLinearGradient(0, canvas.height - h, 0, canvas.height);
        grad.addColorStop(0, '#8a6bff');
        grad.addColorStop(1, '#38d996');
        canvasCtx.fillStyle = grad;
        canvasCtx.fillRect(i * (w + gap), (canvas.height - h) / 2, w, h);
    }
    rafId = requestAnimationFrame(drawFrame);
}

async function startWaveform() {
    try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(micStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        drawFrame();
    } catch (err) {
        // Mic visualization is a bonus — voice answering still works without it.
        console.warn('Waveform mic access denied or unavailable:', err);
    }
}

function stopWaveform() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
    }
    if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
    }
    analyser = null;
    drawIdle();
}

// ---------------- VOICE INPUT ----------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function startListening() {
    if (answered) return;

    if (!SpeechRecognition) {
        statusLine.innerHTML = '<div class="status-line">Voice input isn\'t supported in this browser. Try Chrome on desktop.</div>';
        return;
    }

    statusLine.innerHTML = '';
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognizing = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    listeningLbl.textContent = 'Listening…';
    listeningLbl.classList.add('active');

    startWaveform();
    recognition.start();

    recognition.onresult = (event) => {
        const answer = event.results[0][0].transcript;
        stopListeningUI();
        sendToAI(answer);
    };

    recognition.onerror = (event) => {
        stopListeningUI();
        statusLine.innerHTML = `<div class="status-line">Voice input error: ${event.error}. Tap the mic to try again.</div>`;
    };

    recognition.onend = () => {
        if (recognizing) stopListeningUI();
    };
}

function stopListeningUI() {
    recognizing = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    listeningLbl.textContent = 'Tap the mic to answer';
    listeningLbl.classList.remove('active');
    stopWaveform();
}

micBtn.addEventListener('click', () => {
    if (recognizing) {
        recognition && recognition.stop();
        stopListeningUI();
    } else {
        startListening();
    }
});

// ---------------- SEND TO AI ----------------
function sendToAI(answer) {
    listeningLbl.textContent = 'Scoring your answer…';
    micBtn.disabled = true;

    fetch('/evaluate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, answer })
    })
    .then(res => res.json())
    .then(data => {
        micBtn.disabled = false;
        listeningLbl.textContent = 'Tap the mic to answer again';

        if (data.error) {
            statusLine.innerHTML = `<div class="status-line">${data.error}</div>`;
            return;
        }

        const tier = data.score >= 75 ? 'good' : data.score >= 50 ? 'mid' : 'low';

        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `
            <div class="you-said"><b>You said:</b> ${escapeHtml(answer)}</div>
            <div class="score-row">
                <span class="score-pill ${tier}">${data.score}/100</span>
            </div>
            <div class="feedback-text">${escapeHtml(data.feedback)}</div>
        `;
        logEl.prepend(entry);

        answered = true;
        nextBtn.disabled = false;
        micBtn.disabled = true;
        speak(data.feedback);
    })
    .catch(() => {
        micBtn.disabled = false;
        statusLine.innerHTML = '<div class="status-line">Something went wrong reaching the AI evaluator.</div>';
    });
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ---------------- NEXT QUESTION ----------------
nextBtn.addEventListener('click', () => {
    nextBtn.disabled = true;

    fetch('/next')
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            statusLine.innerHTML = `<div class="status-line">${data.error}</div>`;
            return;
        }
        if (data.done) {
            window.location.href = '/result';
            return;
        }

        question = data.question;
        qIndex = data.index;
        questionEl.textContent = question;
        counterEl.textContent = qIndex;
        progressFill.style.width = Math.round((qIndex / TOTAL) * 100) + '%';
        bottomNote.textContent = `Question ${qIndex} of ${TOTAL} · {{ role }}`;

        answered = false;
        micBtn.disabled = false;
        nextBtn.disabled = true;
        statusLine.innerHTML = '';

        speak(question);
    });
});
</script>

</body>
</html>
